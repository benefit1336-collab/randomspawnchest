# File version (do NOT edit):
file-version: 2

# Spawn position where all spawns will happen around
spawn-position:
  x: 0
  z: 0

# The radius (in blocks)
spawn-radius: 64

# Amount of retries before giving up on getting a location
# This is used to make sure the player doesn't spawn on water or lava
# If the maximum is somehow reached (statistically unlikely), it will
# just assign the last valid location
spawn-retries: 20

# Database filename (without the extension)
db-filename: database